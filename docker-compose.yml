services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ./data/ollama:/root/.ollama

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_PATH: /app/data/pinballchat.sqlite
      PINBALLCHAT_ROOT: /app
      AI_PROVIDER: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      AI_STREAM_DEBUG_TIMING: "1"
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama

  web:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./apps/web/src:/usr/share/nginx/html:ro
    depends_on:
      - api

  trainer-api:
    build: { context: ., dockerfile: trainer/api/Dockerfile }
    profiles: [trainer]
    ports: ["8090:8090"]
    environment:
      TRAINER_ROOT: /workspace/trainer
      TRAINER_DB_PATH: /workspace/trainer/data/trainer.sqlite
      APP_DB_PATH: /workspace/data/pinballchat.sqlite
    volumes:
      - ./trainer:/workspace/trainer
      - ./data:/workspace/data:ro

  trainer-worker:
    build: { context: ., dockerfile: trainer/worker/Dockerfile }
    profiles: [trainer]
    environment:
      TRAINER_ROOT: /workspace/trainer
      TRAINER_DB_PATH: /workspace/trainer/data/trainer.sqlite
      OLLAMA_HOST: http://host.docker.internal:11434
      LLAMA_CPP_DIR: /opt/llama.cpp
      RUNNER_BACKENDS: cuda
    volumes:
      - ./trainer:/workspace/trainer
      - ./data:/workspace/data:ro
    extra_hosts: ["host.docker.internal:host-gateway"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
